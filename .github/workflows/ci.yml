name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore "${{ github.workspace }}/InvoiceManager.slnx"

      - name: Check formatting
        run: dotnet format "${{ github.workspace }}/InvoiceManager.slnx" --verify-no-changes --no-restore

      - name: Build
        run: dotnet build "${{ github.workspace }}/InvoiceManager.slnx" --no-restore --configuration Release

      - name: Check for vulnerable packages
        run: dotnet list "${{ github.workspace }}/InvoiceManager.slnx" package --vulnerable --include-transitive

      # The Cosmos emulator integration tests (Category=Integration) require the
      # Dockerised emulator, which is too slow/unreliable to warm up on hosted
      # runners. They are excluded here and run locally instead (see AGENTS.md /
      # docs). Everything else runs in CI.
      - name: Test
        run: dotnet test "${{ github.workspace }}/InvoiceManager.slnx" --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: ./coverage

  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.64.0
          cache: true
          tflint_config_path: infra/terraform/.tflint.hcl

      - name: Init
        run: terraform init -backend=false

      - name: Format check
        run: terraform fmt -check

      - name: Validate
        run: terraform validate

      - name: tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: tflint
        run: tflint
